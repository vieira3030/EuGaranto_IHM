<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" text="Voltar"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalhes do Produto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="garantia">
    <h1 style="font-weight: bold; margin-bottom: 20px;">{{ garantia.nome }}</h1>
    
    <ion-item>
      <ion-icon name="calendar-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>Data de Compra</h2>
        <p>{{ garantia.dataCompra }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="location-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>Local de Arrumação</h2>
        <p>{{ garantia.localFisico }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="time-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>Tempo Restante</h2>
        <p style="color: green; font-weight: bold;">{{ garantia.diasRestantes }} dias</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="notifications-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>Alerta Configurado</h2>
        <p>{{ garantia.alerta }}</p>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="receipt-outline" slot="start"></ion-icon>
      <ion-label><h2>Foto do Talão</h2></ion-label>
      <ion-button slot="end" fill="clear">Ver Talão</ion-button>
    </ion-item>

    <div style="display: flex; gap: 10px; margin-top: 30px;">
      <ion-button expand="block" color="warning" style="flex: 1;" (click)="editar()">
        <ion-icon name="pencil" slot="start"></ion-icon> Editar
      </ion-button>
      <ion-button expand="block" color="danger" style="flex: 1;" (click)="eliminar()">
        <ion-icon name="trash" slot="start"></ion-icon> Eliminar
      </ion-button>
    </div>
  </div>
</ion-content>
