<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Meus Grupos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h2 class="titulo-seccao">Grupos de Partilha</h2>

  <p *ngIf="grupos.length === 0" class="mensagem-vazia">
    Ainda não criaste nenhum grupo.
  </p>

  <div class="lista-grupos">
    <ion-card *ngFor="let grupo of grupos" 
              [routerLink]="['/detalhe-grupo', grupo.id]" 
              button 
              color="light" 
              class="garantia-card">
      <ion-card-content>
        <ion-label>
          <h3 style="font-weight: bold; font-size: 18px; margin: 0;">{{ grupo.nome }}</h3>
          <p style="margin-top: 5px;">{{ grupo.membros?.length || 0 }} membros</p>
        </ion-label>
      </ion-card-content>
    </ion-card>
  </div>

  <ion-button expand="block" color="primary" class="botao-principal" [routerLink]="['/criar-grupo']" style="margin-top: 20px;">
    <ion-icon name="add-circle-outline" slot="start"></ion-icon>
    Criar grupo
  </ion-button>
</ion-content>
