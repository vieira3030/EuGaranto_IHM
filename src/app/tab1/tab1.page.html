<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>EuGaranto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <p class="titulo-seccao">As minhas garantias:</p>

  <ion-card *ngFor="let garantia of garantias" [routerLink]="['/garantia-detalhe', garantia.id]" color="light" class="garantia-card">
    <ion-card-content>
      Nome do produto: {{ garantia.nome }} <br>
      Dias restantes: <strong>{{ garantia.diasRestantes }} dias restantes</strong>
    </ion-card-content>
  </ion-card>

<ion-button expand="block" color="primary" class="botao-principal" routerLink="/registar-garantia">
  <ion-icon name="add-circle-outline" slot="start"></ion-icon>
  Adicionar garantia
</ion-button>
