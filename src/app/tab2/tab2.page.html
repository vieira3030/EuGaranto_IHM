<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title style="text-decoration: underline; font-weight: bold;">EuGaranto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p style="margin-bottom: 20px; font-size: 16px;">Os meus grupos:</p>

  <!-- Lista iterativa dos grupos criados (Preparação para a Issue #9) -->
  <div *ngFor="let g of grupos"
       style="background: #e0e0e0; padding: 15px; margin-bottom: 12px; color: black; border-radius: 4px;">
    <div style="font-size: 16px; margin-bottom: 4px; font-weight: bold;">{{ g.nome }}</div>
    <div style="font-size: 14px;">Membros: {{ g.membros?.length || 0 }} | Garantias partilhadas: {{ g.garantiasPartilhadas?.length || 0 }}</div>
  </div>

  <!-- Mensagem de estado vazio (quando não há grupos) -->
  <p *ngIf="!grupos || grupos.length === 0" style="text-align: center; color: gray; margin-top: 30px;">
    Ainda não tens grupos criados.
  </p>

  <!-- Ação de redirecionamento estático para o formulário de novo grupo (Issue #8) -->
  <ion-button expand="block" routerLink="/criar-grupo"
              style="--background: #7CFC00; --color: black; height: 70px; font-size: 22px; margin-top: 25px; font-weight: bold;">
    Adicionar Grupo
  </ion-button>
</ion-content>
