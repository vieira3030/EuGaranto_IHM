<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title style="font-weight: bold;">Grupos de Partilha</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <div class="empty-state" *ngIf="grupos.length === 0">
    <ion-icon name="people-outline"></ion-icon>
    <h3>Nenhum grupo</h3>
    <p>Não pertences a nenhum grupo de partilha. Cria um grupo para partilhares as tuas garantias com familiares ou amigos!</p>
  </div>

  <ion-list style="background: transparent;" lines="none" *ngIf="grupos.length > 0">
    <ion-card *ngFor="let grupo of grupos" 
              [routerLink]="['/detalhe-grupo', grupo.id]" 
              button>
      <ion-card-content style="position: relative;">
        <h2 style="margin: 0 0 5px 0; color: var(--ion-text-color);">
          {{ grupo.nome }}
        </h2>
        <p style="margin: 0; color: var(--ion-color-medium);">
          {{ grupo.membros.length }} membros · {{ grupo.garantiasIds.length || 0 }} garantias
        </p>
        <ion-icon name="chevron-forward-outline" 
                  style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--ion-color-medium);">
        </ion-icon>
      </ion-card-content>
    </ion-card>
  </ion-list>

  <ion-button expand="block" size="large" routerLink="/criar-grupo" style="margin-top: 16px; margin-bottom: 32px;">
    <ion-icon slot="start" name="add-circle-outline"></ion-icon>
    Criar Grupo
  </ion-button>

</ion-content>
