<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Meus Grupos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h2 class="titulo-seccao">Grupos de Partilha</h2>

  <p *ngIf="grupos.length === 0" class="mensagem-vazia">
    Ainda não criaste nenhum grupo.
  </p>

  <ion-list class="lista-grupos">
    <ion-item *ngFor="let grupo of grupos" 
              [routerLink]="['/detalhe-grupo', grupo.id]" 
              button 
              color="light" 
              class="grupo-item" 
              lines="none">
      <ion-label>
        <h3>{{ grupo.nome }}</h3>
        <p>{{ grupo.membros.length }} membros</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-button expand="block" 
              color="primary" 
              class="botao-principal" 
              [routerLink]="['/criar-grupo']">
    Criar grupo
  </ion-button>
</ion-content>
