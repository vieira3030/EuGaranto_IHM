<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title style="font-weight: bold;">Meus Grupos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2 style="margin: 0; font-weight: bold;">Grupos de Partilha</h2>
    <ion-button fill="clear" style="--color: #7CFC00;" [routerLink]="['/criar-grupo']">
      Criar Novo
    </ion-button>
  </div>

  <p *ngIf="grupos.length === 0" style="text-align: center; color: gray; margin-top: 50px;">
    Ainda não criaste nenhum grupo.
  </p>

  <ion-list style="background: transparent;">
    <ion-item *ngFor="let grupo of grupos" 
              [routerLink]="['/detalhe-grupo', grupo.id]" 
              button 
              style="--background: #e0e0e0; margin-bottom: 10px; border-radius: 4px;" 
              lines="none">
      <ion-label>
        <h2 style="font-weight: bold;">{{ grupo.nome }}</h2>
        <p>{{ grupo.membros.length }} membros</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
