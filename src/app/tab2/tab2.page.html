<ion-header>
  <ion-toolbar>
    <ion-title>Grupos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  
  <ion-list lines="inset">
    
    <ion-item *ngFor="let grupo of listaGrupos" button="true">
      <ion-icon name="folder-open-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h2 style="font-weight: bold;">{{ grupo }}</h2>
      </ion-label>
      
      <ion-note slot="end">Ver garantias</ion-note>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button>
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
