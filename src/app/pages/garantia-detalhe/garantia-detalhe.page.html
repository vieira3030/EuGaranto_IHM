<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1" text="Voltar"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalhe do Produto:</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding" *ngIf="garantia">
  
  <h2 class="produto-titulo">{{ garantia.nome }}</h2>

  <div class="foto-caixa talao-caixa">
    <span *ngIf="!garantia.fotoTalao">Foto do talão</span>
    <img *ngIf="garantia.fotoTalao" [src]="garantia.fotoTalao" alt="Talão da Garantia">
  </div>

  <div class="detalhes-info">
    <p>Data de compra: {{ garantia.dataCompra }}</p>
    <p>Data de expiração: {{ garantia.dataExpiracao }}</p>
    <p>Dias restantes: {{ garantia.diasRestantes }} dias</p>
    <p>Alerta configurado: {{ garantia.alerta }}</p>
  </div>

  <div class="foto-caixa local-caixa">
    <span *ngIf="!garantia.fotoLocal">Foto do local físico</span>
    <img *ngIf="garantia.fotoLocal" [src]="garantia.fotoLocal" alt="Local Físico">
  </div>

  <div class="botoes-acao">
    <ion-button color="primary" class="btn-acao">Editar</ion-button>
    
    <ion-button color="danger" class="btn-acao" (click)="eliminar()">Eliminar</ion-button>
  </div>

</ion-content>
